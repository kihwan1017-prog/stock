[pytest]
pythonpath = src
testpaths = tests
# 기본 실행 시 외부 API·실전 주문 테스트는 제외
addopts = -q -m "not external and not live"
markers =
    unit: 단위 테스트
    integration: PostgreSQL 등 외부 리소스가 필요한 테스트
    external: 외부 HTTP/API 호출 테스트
    live: 실전 계좌/주문 관련 테스트

filterwarnings =
    ignore::DeprecationWarning
